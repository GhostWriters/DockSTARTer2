---
version: 2

project_name: ds2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    binary: ds2
    ldflags:
      - -s -w
      - -X DockSTARTer2/internal/version.Version={{.RawVersion}}
      - -X DockSTARTer2/internal/version.Commit={{.Commit}}
      - -X DockSTARTer2/internal/version.BuildDate={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: GhostWriters
    name: DockSTARTer2
  prerelease: auto
  draft: false
  replace_existing_draft: true
  replace_existing_artifacts: true
