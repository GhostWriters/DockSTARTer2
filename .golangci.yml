version: "2"
run:
  issues-exit-code: 1
  tests: true
linters:
  settings:
    staticcheck:
      checks:
        - all
        - -ST1005
        - -ST1003
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
