---
name: Test

"on":
  push:
    branches:
      - main
      - WorkingCLI
  pull_request:
    branches:
      - main
      - WorkingCLI

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'

      - name: Run Unit Tests
        run: go test -v ./...
