---
name: Release

"on":
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release even if no meaningful changes detected'
        type: boolean
        required: false
        default: false
      ignore_test_failures:
        description: 'Allow release even if tests/lints fail'
        type: boolean
        required: false
        default: false

jobs:
  check:
    name: Check for Changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      suffix: ${{ steps.suffix.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Determine Suffix
        id: suffix
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "value=" >> $GITHUB_OUTPUT
          else
            echo "value=-${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Detection Logic
        id: decide
        run: |
          set -euo pipefail

          # Harvesting inputs
          FORCE_CHANGES=$(echo "${{ github.event.inputs.force_release }}" | tr '[:upper:]' '[:lower:]')
          SUFFIX="${{ steps.suffix.outputs.value }}"

          echo "Force Release (Changes): $FORCE_CHANGES"
          echo "Channel Suffix: $SUFFIX"

          if [[ "$FORCE_CHANGES" == "true" ]]; then
            echo "Release forced by user input."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Find the last tag specifically for this channel
          # If no tag found, we assume a first-time release for this channel and run
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v2.*$SUFFIX" 2>/dev/null || echo "")
          echo "Last tag for channel [$SUFFIX]: ${LAST_TAG:-NONE}"

          if [[ -z "$LAST_TAG" ]]; then
            echo "No previous tag found for this channel. Proceeding with initial release."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get changed files since last channel tag
          CHANGED=$(git diff --name-only "$LAST_TAG" HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -Eqv '^(docs/|\.github/|\.gitignore|\.editorconfig|README\.md|LICENSE)'; then
            echo "Meaningful changes detected."
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "No meaningful changes detected for this channel."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  test:
    name: Run Tests
    needs: [check]
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run Linter
        id: lint
        # Continue on error if user requested it, but we still mark it as failed for the release job's logic
        continue-on-error: true
        run: |
          if [ -f .golangci.yml ]; then
            go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
            golangci-lint run ./...
          else
            go vet ./...
          fi

      - name: Run Tests
        id: unit_tests
        continue-on-error: true
        run: go test -v ./...

      - name: Final Test Status
        run: |
          if [[ "${{ steps.lint.outcome }}" == "failure" || "${{ steps.unit_tests.outcome }}" == "failure" ]]; then
            echo "Tests failed."
            exit 1
          fi

  release:
    name: Execute Release
    needs: [check, test]
    # Always run if check passed, so we can decide based on force flags if test failed
    if: always() && needs.check.result == 'success' && needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate Release Eligibility
        run: |
          TEST_RESULT="${{ needs.test.result }}"
          IGNORE_FAILURES=$(echo "${{ github.event.inputs.ignore_test_failures }}" | tr '[:upper:]' '[:lower:]')

          echo "Test Job Result: $TEST_RESULT"
          echo "Ignore Test Failures: $IGNORE_FAILURES"

          if [[ "$TEST_RESULT" != "success" && "$IGNORE_FAILURES" != "true" ]]; then
            echo "Tests failed and 'ignore_test_failures' is NOT set. Aborting release."
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Generate Version Tag
        id: tag
        run: |
          set -euo pipefail
          SUFFIX="${{ needs.check.outputs.suffix }}"
          TODAY_INT=$(date -u +'%Y%m%d')

          # Find highest sequence number (N) for today in this channel
          LAST_N=$(git tag -l "v2.$TODAY_INT.*$SUFFIX" | sed "s/v2.$TODAY_INT.//" | sed "s/$SUFFIX//" | sort -n | tail -n 1)
          NEW_N=$(( ${LAST_N:-0} + 1 ))
          NEW_TAG="v2.$TODAY_INT.$NEW_N$SUFFIX"

          echo "New tag: $NEW_TAG"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.tag }}
